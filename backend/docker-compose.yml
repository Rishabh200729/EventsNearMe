version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: ./backend/docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/eventsnearme
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - eventsnearme

  mongodb:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=eventsnearme
    volumes:
      - mongodb_data:/data/db
      - ./docker/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    restart: unless-stopped
    networks:
      - eventsnearme

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - eventsnearme

  # Background job worker (optional - for production scaling)
  worker:
    build:
      context: ..
      dockerfile: ./backend/docker/Dockerfile
    command: ["npm", "run", "worker"]
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/eventsnearme
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - eventsnearme
    deploy:
      replicas: 2

volumes:
  mongodb_data:
  redis_data:

networks:
  eventsnearme:
    driver: bridge